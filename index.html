<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenic Driver - Hardware Integration Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a3e4ff; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        #ui {
            position: absolute; top: 5%; left: 5%; color: white;
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 12px;
            border-left: 6px solid #ffdd00; z-index: 100;
        }
        #restart-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 1000;
        }
        .restart-btn {
            padding: 15px 40px; font-size: 20px; background: #2ecc71;
            border: none; color: white; border-radius: 30px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 12px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px;">TOUR DISTANCE</div>
        <div id="score" style="font-size: 28px; font-weight: bold;">0 m</div>
        <div id="status" style="font-size: 12px; color: #ffdd00; margin-top: 5px;">WAITING FOR JOYSTICK...</div>
    </div>

    <div id="restart-screen">
        <h1 style="font-size: 48px; margin-bottom: 10px; color: #e74c3c;">CRASHED!</h1>
        <button class="restart-btn" onclick="location.reload()">RESTART TOUR</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3e4ff);
        scene.fog = new THREE.Fog(0xa3e4ff, 70, 250);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 2, -15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- WORLD OBJECTS ---
        const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x3d3d3d }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const laneLines = [];
        for(let i = 0; i < 40; i++) {
            [-4, 4].forEach(x => {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI/2; line.position.set(x, 0.05, -i * 20);
                scene.add(line); laneLines.push(line);
            });
        }

        // --- PLAYER CAR ---
        function createCar(color) {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 5), new THREE.MeshPhongMaterial({color}));
            body.position.y = 0.8;
            const glass = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 2.5), new THREE.MeshPhongMaterial({color: 0x1a1a1a}));
            glass.position.set(0, 1.6, -0.2);
            
            const lightGeo = new THREE.BoxGeometry(0.6, 0.3, 0.1);
            const brakeMat = new THREE.MeshBasicMaterial({ color: 0x550000 });
            const leftB = new THREE.Mesh(lightGeo, brakeMat);
            const rightB = new THREE.Mesh(lightGeo, brakeMat);
            leftB.position.set(-0.8, 0.8, 2.5);
            rightB.position.set(0.8, 0.8, 2.5);
            car.add(leftB, rightB);
            car.userData.brakeLights = [leftB, rightB];

            car.add(body, glass);
            return car;
        }

        const player = createCar(0xd32f2f);
        scene.add(player);

        // --- NPC SYSTEM ---
        const npcs = [];
        for(let i=0; i<5; i++) {
            const npc = createCar(Math.random() * 0xffffff);
            npc.position.set((Math.random()-0.5)*15, 0, -100 - (i*60));
            scene.add(npc); npcs.push(npc);
        }

        // --- GAME LOGIC ---
        let speed = 0, distance = 0, isCrashed = false;

        function updateJoystick() {
            const gamepads = navigator.getGamepads();
            const gp = gamepads[0];

            if (gp && !isCrashed) {
                document.getElementById('status').innerText = "HARDWARE CONNECTED";
                
                // 1. STEERING (Axis 0: Range -1 to 1)
                let steerValue = gp.axes[0];
                if (Math.abs(steerValue) > 0.05) {
                    player.position.x += steerValue * 0.3;
                    player.rotation.y = -steerValue * 0.4;
                } else {
                    player.rotation.y *= 0.8;
                }

                // 2. ACCELERATOR (Axis 1: -1 is gas, 1 is brake/neutral)
                let pedalInput = gp.axes[1];
                if (pedalInput < -0.1) {
                    speed += 0.005 * Math.abs(pedalInput);
                    player.userData.brakeLights.forEach(l => l.material.color.setHex(0x550000));
                } else if (pedalInput > 0.1) {
                    speed -= 0.02 * pedalInput;
                    player.userData.brakeLights.forEach(l => l.material.color.setHex(0xff0000));
                } else {
                    speed -= 0.001;
                    player.userData.brakeLights.forEach(l => l.material.color.setHex(0x550000));
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isCrashed) {
                updateJoystick();
                speed = Math.max(0, Math.min(speed, 0.25));
                player.position.x = THREE.MathUtils.clamp(player.position.x, -9, 9);
                distance += speed;
            }

            // World Scrolling
            const step = speed * 15;
            laneLines.forEach(l => { l.position.z += step; if(l.position.z > 30) l.position.z = -500; });
            
            // Collision & NPCs
            npcs.forEach(npc => {
                npc.position.z += step - 0.8;
                if(npc.position.z > 30) { npc.position.z = -300; npc.position.x = (Math.random()-0.5)*16; }

                if (Math.abs(player.position.x - npc.position.x) < 2.2 && Math.abs(player.position.z - npc.position.z) < 4.5 && !isCrashed) {
                    isCrashed = true;
                    document.getElementById('restart-screen').style.display = 'flex';
                }
            });

            document.getElementById('score').innerText = Math.floor(distance) + " m";
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
